<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo Videos | RANGE AUTOMOBILES</title>

<style>

:root{
    --maroon:#800000;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    color:white;
}

nav{
    padding:15px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--maroon);
    background:#000;
}

.nav-logo{
    color:white;
    text-decoration:none;
    font-size:1.5rem;
    font-weight:bold;
}

.nav-logo span{
    color:var(--maroon);
}

.container{
    padding:60px 8%;
}

.page-title{
    text-align:center;
    margin-bottom:50px;
}

.page-title h1{
    font-size:3rem;
    letter-spacing:5px;
}

.page-title span{
    color:var(--maroon);
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
    gap:40px;
}

.video-card{
    background:#111;
    padding:20px;
    border:1px solid #222;
    border-radius:10px;
}

.video-card h3{
    margin-bottom:15px;
    color:var(--maroon);
    letter-spacing:2px;
}

video{
    width:100%;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #222;
    margin-top:60px;
    color:#777;
}

</style>
</head>

<body>

<nav>
    <a href="index.html" class="nav-logo">
        RANGE <span>AUTOMOBILES</span>
    </a>
</nav>

<div class="container">

    <div class="page-title">
        <h1>PROMO <span>VIDEOS</span></h1>
        <p>Experience the RANGE Automobiles standard.</p>
    </div>

    <div class="video-grid">

        <div class="video-card">
            <h3>Promo Video 01</h3>
            <video controls>
                <source src="promo.video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-card">
            <h3>Promo Video 02</h3>
            <video controls>
                <source src="promo2.video.mp4" type="video/mp4">
            </video>
        </div>

    </div> 

    <div class="video-card">
    <h3>Promo Video 03</h3>
    
    <video controls>
        <source src="promo3.video.mp4" type="video/mp4">
    </video>
</div>

</div>

<footer>
    <p>© 2026 RANGE AUTOMOBILES</p>
</footer>

</body>
</html>
