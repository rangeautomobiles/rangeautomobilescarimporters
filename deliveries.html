<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliveries | RANGE AUTOMOBILES</title>
    <style>
        :root { 
            --maroon: #800000; 
            --white: #ffffff; 
            --text-dim: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #000; color: var(--white); line-height: 1.6; }

        /* Navigation */
        nav { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: #000; border-bottom: 2px solid var(--maroon); position: sticky; top: 0; z-index: 1000; 
        }
        .nav-logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 1.4rem; color: var(--white); text-decoration: none; }
        .nav-logo span { color: var(--maroon); }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .nav-links a:hover, .nav-links a.active { color: var(--maroon); }
        .promo-btn { border: 1px solid var(--maroon); padding: 8px 15px; border-radius: 2px; }

        /* Portfolio Grid */
        .portfolio-section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; text-align: center; }
        .section-title { font-size: 2.2rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 50px; }
        .section-title span { color: var(--maroon); }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .delivery-card { background: #111; border: 1px solid #222; overflow: hidden; }
        .delivery-img { width: 100%; height: 300px; object-fit: cover; border-bottom: 3px solid var(--maroon); }
        .delivery-info { padding: 20px; }
        .delivery-info h3 { font-size: 1rem; text-transform: uppercase; color: var(--white); }

        footer { padding: 50px; text-align: center; border-top: 1px solid #222; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">RANGE <span>AUTOMOBILES</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="deliveries.html" class="active">Deliveries</a></li>
            <li><a href="specifications.html">Specifications</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="promo.video.mp4" class="promo-btn" target="_blank">Watch Promo</a></li>
        </ul>
    </nav>

    <section class="portfolio-section">
        <h2 class="section-title">PORTFOLIO OF <span>EXCELLENCE</span></h2>
        <div class="portfolio-grid">
            <div class="delivery-card">
                <img src="delivered-1.png" alt="Range Rover Velar" class="delivery-img">
                <div class="delivery-info"><h3>Range Rover Velar</h3></div>
            </div>
            <div class="delivery-card">
                <img src="delivered-2.png" alt="Honda Vezel" class="delivery-img">
                <div class="delivery-info"><h3>Honda Vezel</h3></div>
            </div>
            <div class="delivery-card">
                <img src="delivered-3.png" alt="Premium Unit" class="delivery-img">
                <div class="delivery-info"><h3>Premium Unit</h3></div>
            </div>
            <div class="delivery-card">
                <img src="delivered-4.png" alt="Premium Unit" class="delivery-img">
                <div class="delivery-info"><h3>Premium Unit</h3></div>
            </div>
        </div>
    </section>

    <footer>
        <p style="color:var(--maroon); font-weight:bold; letter-spacing:2px; margin-bottom:10px;">RANGE AUTOMOBILES PVT LTD</p>
        <p>INTEGRITY • PRIVACY • RESPECT</p>
    </footer>

</body>
</html>
