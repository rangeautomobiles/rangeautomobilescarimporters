

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Range Automobiles | Premium Car Imports</title>
    <style>
        /* CSS Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
        }

        .hero {
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 800px;
            margin: 20px;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .highlight {
            color: #f39c12; /* Gold accent */
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .badge {
            display: inline-block;
            background: #f39c12;
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .cta-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            background: transparent;
            color: white;
            border: 2px solid #f39c12;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
            text-decoration: none;
        }

        .cta-btn:hover {
            background: #f39c12;
            color: black;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="glass-card">
            <div class="badge">EST. 2018</div>
            <h1>Range <span class="highlight">Automobiles</span></h1>
            <p>Your Premier Destination for Luxury & Performance Car Imports in Sri Lanka. Experience transparency, reliability, and world-class service.</p>
            <a href="#" class="cta-btn" onclick="welcomeAlert()">Explore Inventory</a>
        </div>
    </section>

    <script>
        // Simple JavaScript functionality
        function welcomeAlert() {
            alert("Welcome to Range Automobiles! We are fetching the latest luxury models for you.");
        }
    </script>

</body>
</html>
