<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deliveries | RANGE AUTOMOBILES</title>
    <style>
        :root { 
            --maroon: #800000; 
            --bg-gray: #1a1a1a; 
            --card-gray: #252525; 
            --white: #ffffff; 
            --text-dim: #bbbbbb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #000; color: var(--white); line-height: 1.6; overflow-x: hidden; }

        /* Navigation */
        nav { 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            background: #000; border-bottom: 2px solid var(--maroon); position: sticky; top: 0; z-index: 1000; 
        }
        .nav-logo { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 1.4rem; color: var(--white); text-decoration: none; }
        .nav-logo span { color: var(--maroon); }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: bold; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--maroon); }
        .promo-btn { border: 1px solid var(--maroon); padding: 8px 15px; border-radius: 2px; }

        /* Header */
        .page-header { padding: 80px 5% 40px; text-align: center; background: linear-gradient(to bottom, #000, #111); }
        .page-header h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 10px; }
        .page-header h1 span { color: var(--maroon); }
        .page-header p { color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; }

        /* Privacy Banner */
        .privacy-banner { background: var(--maroon); color: white; padding: 20px; text-align: center; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; }

        /* Delivery Portfolio Grid */
        .portfolio-section { padding: 60px 5%; max-width: 1400px; margin: 0 auto; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .delivery-card { 
            background: var(--card-gray); 
            border: 1px solid #222; 
            overflow: hidden; 
            transition: 0.4s;
            position: relative;
        }
        .delivery-card:hover { border-color: var(--maroon); transform: translateY(-5px); }
        
        .delivery-img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            filter: brightness(80%); 
            transition: 0.5s; 
        }
        .delivery-card:hover .delivery-img { filter: brightness(100%); }

        .delivery-info { padding: 25px; border-top: 1px solid #333; }
        .delivery-info h3 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: var(--white); }
        .delivery-info p { color: var(--maroon); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }

        footer { padding: 50px; text-align: center; border-top: 1px solid #222; margin-top: 50px; font-size: 0.8rem; color: #555; }
    </style>
</head>
